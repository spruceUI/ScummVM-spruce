name: Build scummvm.64

on:
  workflow_dispatch:
    inputs:
      scummvm_version:
        description: 'ScummVM version tag'
        default: 'v2026.1.0'
      debug_enabled:
        description: 'Enable step debug logging'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      scummvm_version:
        type: string
        default: 'v2026.1.0'

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/scummvm-builder-64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure latest release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="latest"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Latest Build" \
              --notes "ScummVM ${{ github.event.inputs.scummvm_version || 'v2026.1.0' }} binaries for spruce" \
            || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.64
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-64-${{ github.event.inputs.scummvm_version || 'v2026.1.0' }}-${{ github.sha }}
          restore-keys: |
            ccache-64-${{ github.event.inputs.scummvm_version || 'v2026.1.0' }}-
            ccache-64-

      - name: Build ScummVM
        run: |
          mkdir -p output ccache
          docker run --rm \
            -e SCUMMVM_VERSION=${{ github.event.inputs.scummvm_version || 'v2026.1.0' }} \
            -v ${{ github.workspace }}/output:/output \
            -v ${{ github.workspace }}/ccache:/ccache \
            ${{ env.IMAGE }}:latest

      - name: Upload binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f output/scummvm.64.7z ]; then
            gh release upload "latest" output/scummvm.64.7z --clobber
          else
            echo "Error: output/scummvm.64.7z not found."
            exit 1
          fi
