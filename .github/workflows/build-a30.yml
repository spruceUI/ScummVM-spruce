name: Build scummvm.a30

on:
  workflow_dispatch:
    inputs:
      scummvm_version:
        description: 'ScummVM version tag'
        default: 'v2026.1.0'
  workflow_call:
    inputs:
      scummvm_version:
        type: string
        default: 'v2026.1.0'

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/spruceui/scummvm-builder-a30

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure beta release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="beta-${{ github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Beta Build (${{ github.ref_name }})" \
              --prerelease \
              --notes "ScummVM binaries built from ${{ github.ref_name }}" \
            || true

      - name: Download A30 toolchain
        run: |
          wget -q -O a30_toolchain-v1.0.tar.gz \
            "https://github.com/steward-fu/website/releases/download/miyoo-a30/a30_toolchain-v1.0.tar.gz"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.a30
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-a30-${{ github.event.inputs.scummvm_version || 'v2026.1.0' }}-${{ github.sha }}
          restore-keys: |
            ccache-a30-${{ github.event.inputs.scummvm_version || 'v2026.1.0' }}-
            ccache-a30-

      - name: Build ScummVM
        run: |
          mkdir -p output ccache
          docker run --rm \
            -e SCUMMVM_VERSION=${{ github.event.inputs.scummvm_version || 'v2026.1.0' }} \
            -v ${{ github.workspace }}/output:/output \
            -v ${{ github.workspace }}/ccache:/ccache \
            ${{ env.IMAGE }}:latest

      - name: Upload binary and libs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv output/scummvm output/scummvm.a30
          gh release upload "beta-${{ github.ref_name }}" output/scummvm.a30 --clobber
          gh release upload "beta-${{ github.ref_name }}" output/libtheoradec.so.1* --clobber
          gh release upload "beta-${{ github.ref_name }}" output/libSDL2_net-2.0.so.0* --clobber
          gh release upload "beta-${{ github.ref_name }}" output/fixjoy --clobber
          gh release upload "beta-${{ github.ref_name }}" output/libfluidlite.so* --clobber
          gh release upload "beta-${{ github.ref_name }}" output/libasound.so.2* --clobber
