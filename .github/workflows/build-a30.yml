name: Build scummvm.a30

on:
  workflow_dispatch:
    inputs:
      scummvm_version:
        description: 'ScummVM version tag'
        default: 'v2026.2.0'
      debug_enabled:
        description: 'Enable step debug logging'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      scummvm_version:
        type: string
        default: 'v2026.2.0'

permissions:
  contents: write
  packages: write

env:
  # This avoids overwriting the original 'latest' image and ensures isolation.
  IMAGE: ghcr.io/spruceui/scummvm-builder-a30:v2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="beta-${{ github.ref_name }}"
          echo "Target Release Tag: $TAG"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Beta Build (${{ github.ref_name }})" \
              --prerelease \
              --notes "ScummVM binaries built from ${{ github.ref_name }} (v2026.2.0)" \
            || true

      - name: Download A30 toolchain
        run: |
          wget -q -O a30_toolchain-v1.0.tar.gz \
            "https://github.com/steward-fu/website/releases/download/miyoo-a30/a30_toolchain-v1.0.tar.gz"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.a30
          push: true
          # [AUTO-SAVE] GHCR will automatically create the 'v2' tag if it doesn't exist.
          tags: ${{ env.IMAGE }}
          cache-from: type=registry,ref=${{ env.IMAGE }}-cache
          cache-to: type=registry,ref=${{ env.IMAGE }}-cache,mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-a30-${{ github.event.inputs.scummvm_version || 'v2026.2.0' }}-${{ github.sha }}
          restore-keys: |
            ccache-a30-${{ github.event.inputs.scummvm_version || 'v2026.2.0' }}-
            ccache-a30-

      - name: Build ScummVM
        run: |
          mkdir -p output ccache
          docker run --rm \
            -e SCUMMVM_VERSION=${{ github.event.inputs.scummvm_version || 'v2026.2.0' }} \
            -v ${{ github.workspace }}/output:/output \
            -v ${{ github.workspace }}/ccache:/ccache \
            ${{ env.IMAGE }}

      - name: Upload binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # [PACKAGE] Find the 7z package and upload it to the beta release tag.
          FILE_PATH=$(ls output/scummvm.a30.*.7z | head -n 1)
          TAG="beta-${{ github.ref_name }}"

          if [ -f "$FILE_PATH" ]; then
            echo "Uploading $FILE_PATH to release $TAG..."
            gh release upload "$TAG" "$FILE_PATH" --clobber
          else
            echo "Error: Generated 7z file not found. Check build-a30.sh logic."
            exit 1
          fi
